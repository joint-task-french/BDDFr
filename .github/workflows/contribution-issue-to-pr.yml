name: "Création PR via Issue"

on:
  issues:
    types: [opened, edited]

jobs:
  create-pr:
    if: startsWith(github.event.issue.title, '[Contribution]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Appliquer le patch JSON
        id: apply-patch
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/apply-contribution-patch.mjs

      - name: Créer la Pull Request
        id: cpr
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat(data): contribution via issue #${{ github.event.issue.number }}"
          title: "Contribution de données: #${{ github.event.issue.number }}"
          body: |
            Contribution soumise via le générateur web par @${{ github.event.issue.user.login }}
            Cette Pull Request adresse l'issue #${{ github.event.issue.number }}
          branch: contrib/issue-${{ github.event.issue.number }}
          base: dev

      - name: Succès - Fermer l'issue
        if: success() && steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = "${{ steps.cpr.outputs.pull-request-url }}";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Succès !**\n\nLes données ont été traitées automatiquement. La [Pull Request a été générée](${prUrl}) pour validation par les administrateurs.\n\nL'issue est désormais fermée car le relais est pris par la Pull Request.`
            });
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });

      - name: Erreur - Commenter l'issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ **Erreur lors du traitement automatique**\n\nNos automates n'ont pas pu appliquer les modifications (le fichier cible n'existe pas ou le JSON est invalide).\n\nL'issue reste ouverte pour qu'un administrateur puisse vérifier et appliquer les données manuellement."
            });