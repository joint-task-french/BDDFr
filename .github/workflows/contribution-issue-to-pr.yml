name: "Création PR via Issue"

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-pr:
    if: startsWith(github.event.issue.title, '[Contribution]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Appliquer le patch JSONC
        id: apply-patch
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/apply-contribution-patch.mjs

      - name: Créer la Pull Request
        id: cpr
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat(data): contribution via issue #${{ github.event.issue.number }}"
          title: "Contribution de données: #${{ github.event.issue.number }}"
          body: |
            Contribution soumise via le générateur web par @${{ github.event.issue.user.login }}
            Cette Pull Request adresse l'issue #${{ github.event.issue.number }}
          branch: contrib/issue-${{ github.event.issue.number }}
          base: dev

      - name: Succès - Fermer l'issue
        if: success() && steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = "${{ steps.cpr.outputs.pull-request-url }}";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Succès !**\n\nLes données ont été traitées automatiquement en préservant les commentaires. La [Pull Request a été générée](${prUrl}).\n\nL'issue est désormais fermée.`
            });
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });

      - name: Erreur - Commenter l'issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ **Erreur lors du traitement automatique**\n\nL'application du patch a échoué. Cela peut arriver si le fichier cible est mal formé ou si une dépendance est manquante."
            });