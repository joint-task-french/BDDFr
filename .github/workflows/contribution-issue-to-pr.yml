name: "Création PR via Issue"

on:
  issues:
    types: [opened, edited]

jobs:
  create-pr:
    if: startsWith(github.event.issue.title, '[Contribution]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Appliquer le patch JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/apply-contribution-patch.mjs

      - name: Créer la Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat(data): contribution via issue #${{ github.event.issue.number }}"
          title: "Contribution de données: #${{ github.event.issue.number }}"
          body: |
            Contribution soumise via le générateur web par @${{ github.event.issue.user.login }}
            Ferme #${{ github.event.issue.number }}
          branch: contrib/issue-${{ github.event.issue.number }}
          base: dev

      - name: Commenter l'issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ Merci pour ta contribution ! Le patch a été appliqué et une Pull Request a été générée pour validation."
            })